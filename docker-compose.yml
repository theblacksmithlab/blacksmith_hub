version: '3.8'

services:
  bot_foundry_base:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot_foundry_base
    image: bot_foundry_base
    profiles: ["never-start"]

  the_forge_base:
    build:
      context: .
      dockerfile: docker/Dockerfile.the_forge_base
    image: the_forge_base
    profiles: ["never-start"]

  probiot_bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.probiot_bot
    env_file:
      - .env
    volumes:
      - /root/projects/whisper.cpp/models:/app/whisper.cpp/models
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    restart: unless-stopped

  groot_bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.groot_bot
    env_file:
      - .env
    volumes:
      - /root/projects/whisper.cpp/models:/app/whisper.cpp/models
      - ./common_res/groot_bot:/app/common_res/groot_bot
    user: "1001:1000"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    restart: unless-stopped

  blacksmith_web:
    build:
      context: .
      dockerfile: docker/Dockerfile.blacksmith_web
    volumes:
      - ./common_res:/app/common_res
    env_file:
      - .env
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    restart: unless-stopped

  uniframe_studio:
    build:
      context: .
      dockerfile: docker/Dockerfile.uniframe_studio
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      - DUBBING_SERVICE_URL=http://AI_SERVER_IP:8000
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    restart: unless-stopped
