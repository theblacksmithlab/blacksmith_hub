services:
  runtime-base:
    build:
      context: .
      dockerfile: docker/Dockerfile.base
    image: runtime-base

  probiot_bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.probiot_bot
    depends_on:
      - runtime-base
    env_file:
      - .env
    volumes:
      - /root/projects/whisper.cpp/models:/app/whisper.cpp/models
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    restart: unless-stopped

  ai_forge:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai_forge
    volumes:
      - ./blacksmith_lab.db:/app/blacksmith_lab.db
      - ./request_app.db:/app/request_app.db
      - ./common_res:/app/common_res
      - /etc/letsencrypt:/etc/letsencrypt:ro
    env_file:
      - .env
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    restart: unless-stopped
