networks:
  uniframe-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"

services:
  bot_foundry_base:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot_foundry_base
    image: bot_foundry_base
    profiles: [ "never-start" ]

  agent_foundry_base:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent_foundry_base
    image: agent_foundry_base
    profiles: [ "never-start" ]

  the_forge_base:
    build:
      context: .
      dockerfile: docker/Dockerfile.the_forge_base
    image: the_forge_base
    profiles: [ "never-start" ]

  probiot_bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.probiot_bot
    env_file:
      - .env
    volumes:
      - /root/projects/whisper.cpp/models:/app/whisper.cpp/models
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  groot_bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.groot_bot
    env_file:
      - .env
    volumes:
      - /root/projects/whisper.cpp/models:/app/whisper.cpp/models
      - ./common_res/groot_bot:/app/common_res/groot_bot
      - ./common_res/messages/groot_bot:/app/common_res/messages/groot_bot
      - ./common_res/messages/agent_davon:/app/common_res/messages/agent_davon
      - ./common_res/messages/common:/app/common_res/messages/common
      - ./common_res/system_roles/groot_bot:/app/common_res/system_roles/groot_bot
      - ./common_res/local_db:/app/common_res/local_db
      - ./common_res/agent_davon:/app/common_res/agent_davon
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  agent_davon:
    build:
      context: .
      dockerfile: docker/Dockerfile.agent_davon
    env_file:
      - .env
    volumes:
      - ./common_res/agent_davon:/app/common_res/agent_davon
      - ./common_res/messages/common:/app/common_res/messages/common
      - ./common_res/system_roles/agent_davon:/app/common_res/system_roles/agent_davon
      - ./common_res/local_db:/app/common_res/local_db
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  blacksmith_web:
    build:
      context: .
      dockerfile: docker/Dockerfile.blacksmith_web
    volumes:
      - ./common_res:/app/common_res
    env_file:
      - .env
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  uniframe_studio:
    build:
      context: .
      dockerfile: docker/Dockerfile.uniframe_studio
    volumes:
      - ./common_res:/app/common_res
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - uniframe-network
